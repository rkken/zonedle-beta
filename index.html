<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSD Heardle</title>
    <link rel="stylesheet" href="heardle.css">
    <script src="heardle.js"></script>
</head>
<body>
    <div class="board">
        <button class="play-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="currentColor" class="bi bi-play-circle" viewBox="0 0 16 16">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                <path d="M6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5a.5.5 0 0 1 .271-.445"/>
            </svg>
        </button>
        <div class="guesses">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div class="info"></div>
        <div class="input-container">
            <div class="suggestions">
                <ul class="suggestion-list"></ul>
            </div>
            <input class="search" type="text">
        </div>
    </div>
</body>
</html>
