<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Zonedle</title>
    <link rel="stylesheet" href="zonedle.css">
    <script type="module" src="zonedle.js"></script>
</head>
<body>
    <div class="board">
        <div class="image-container">
            <img class="image" src="assets/s1/GHZ.png">
        </div>
        <div class="status-container">
                <div class="attempt-1"></div>
                <div class="attempt-2"></div>
                <div class="attempt-3"></div>
                <div class="attempt-4"></div>
                <div class="attempt-5"></div>
            </div>
        <div class="input-container">
            <div class="suggestions">
                <ul class="suggestion-list"></ul>
            </div>
            <input class="search" type="text" placeholder="Guess a Zone!">
            <div class="button-container">
                <button class="skip">SKIP</button>
                <button class="submit">SUBMIT</button>
            </div>
        </div>
        <div class="result-container">
            <div class="result-comment">Amazing!</div>
            <div class="result-answer">The answer was:</div>
            <div class="result-name-container">
                <div class="result-zone"></div>
                <div class="result-game"></div>
            </div>
            <button class="share-button">SHARE</button>
        </div>
    </div>
</body>
</html>
